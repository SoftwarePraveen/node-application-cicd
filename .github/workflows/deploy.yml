name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Prepare Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
          cache: "npm"

      - name: Install dependencies (check only)
        run: npm install

      - name: Create deployment package
        run: |
          mkdir -p deploy

          # Copy actual project files
          cp index.js deploy/
          cp package*.json deploy/
          cp ecosystem.config.cjs deploy/ || echo "No PM2 config found"
          cp Dockerfile deploy/ || echo "No Dockerfile"
          cp docker-compose.yml deploy/ || echo "No docker-compose"

          # Optional env
          [ -f .env.example ] && cp .env.example deploy/ || echo "No .env.example"

          tar -czf deploy.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          scp -i key.pem -o StrictHostKeyChecking=no deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/tmp/

          ssh -i key.pem -o StrictHostKeyChecking=no ${EC2_USERNAME}@${EC2_HOST} << 'EOF'

            cd /var/www/express-app || mkdir -p /var/www/express-app && cd /var/www/express-app

            sudo chown -R $USER:$USER /var/www/express-app

            # Backup
            if [ -f "index.js" ]; then
              mkdir -p backups
              timestamp=$(date +%Y%m%d_%H%M%S)
              tar -czf backups/backup_$timestamp.tar.gz . 2>/dev/null || true
              ls -t backups/*.tar.gz | tail -n +6 | xargs -r rm
            fi

            # Extract new code
            tar --overwrite -xzf /tmp/deploy.tar.gz -C /var/www/express-app
            rm /tmp/deploy.tar.gz

            # Install dependencies
            npm ci --production

            # Create env
            if [ ! -f .env ]; then
              echo "NODE_ENV=production" > .env
              echo "PORT=8080" >> .env
            fi

            # PM2 restart
            if pm2 describe express-app > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env || pm2 restart express-app
            else
              pm2 start index.js --name express-app
            fi

            pm2 save

          EOF

          rm key.pem

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Checking app..."

          for i in {1..3}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://${EC2_HOST} || echo 000)

            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "✅ Success ($code)"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Deployment failed"
          exit 1